<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>id card</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;background-color: aliceblue;

        }
          .card{
            background-color: aliceblue;
            padding: 40px;
            border-radius: 20px; 
        } 
         .id{
            width: 600px;
            background: white;
             border: 2px solid black; 
            border-radius: 15px; 

            

        }
        .logo{
            
            font-weight: bold;
        }
        
        .abc{
             height: 70px; 
              background-color: aqua; 
             display: flex;
              align-items: center;
              gap: 20px;
             padding: 0 30px;  
        }
        .abc h2{
            width: 500px;
             text-align: center; 
             
        }
        .content{
            display: flex;
            padding: 25px;
            gap: 50px;
        }
        .photo{
            width: 150px;
            height: 100px;
            border: 2px solid black;
            border-radius: 10px;
        }
        .details input{
            width: 250px;
            border: none;
            border-bottom: 1px solid black; 
            padding: 5px;
          
        }
        .signature{
            text-align: right;
            
        }
       
       
         

    </style>
</head>
<body>

        <div class="id">
            <div class="abc">
                <div class="logo">logo</div>
                   <h2>oppty</h2>
